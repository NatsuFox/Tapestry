name: Release Skill Bundle

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version override. Defaults to the pushed tag or pyproject version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release-bundle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "RELEASE_VERSION=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
          elif [ -n "${{ inputs.version }}" ]; then
            echo "RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release archives
        run: |
          if [ -n "${RELEASE_VERSION:-}" ]; then
            python .github/build_release_bundle.py --version "${RELEASE_VERSION}"
          else
            python .github/build_release_bundle.py
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-skill-bundle
          path: dist/releases/*

      - name: Publish GitHub release assets
        if: env.RELEASE_TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/releases/*
          generate_release_notes: true
