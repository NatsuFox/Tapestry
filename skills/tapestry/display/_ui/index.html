<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tapestry Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Crimson+Pro:wght@400;500;600&family=Playfair+Display:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:wght@300;400;500&family=Libre+Baskerville:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/styles.css?v=14" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <div class="app-shell">
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="eyebrow" data-i18n="knowledge-base">Knowledge Base</div>
          <h1>Tapestry</h1>
          <p data-i18n="tagline">Browse topics, chapters, and evolving research notes in one readable surface.</p>
        </div>

        <div class="theme-selector">
          <label class="theme-label" data-i18n="theme">Theme</label>
          <select id="theme-select" class="theme-dropdown">
            <option value="default">Warm Earth</option>
            <option value="lavender">Lavender</option>
            <option value="ocean">Ocean</option>
            <option value="rose">Rose</option>
          </select>
        </div>

        <div class="theme-selector">
          <label class="theme-label" data-i18n="language">Language / 语言</label>
          <select id="lang-select" class="theme-dropdown">
            <option value="auto">Auto Detect</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>
        </div>

        <button class="sidebar-action" id="home-link" type="button" data-i18n="open-root">Open Root Index</button>

        <div class="search-panel">
          <label class="search-label" for="search" data-i18n="search-label">Find a topic or document</label>
          <input id="search" class="search" type="search" data-i18n-placeholder="search-placeholder" placeholder="Search titles, paths, excerpts" />
        </div>

        <div id="search-results" class="search-results"></div>
        <nav id="tree" class="tree" aria-label="Knowledge base navigation"></nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <button id="nav-toggle" class="icon-button" type="button" aria-label="Toggle navigation">☰</button>
          <div class="breadcrumbs" id="breadcrumbs"></div>
        </header>

        <section class="hero">
          <div class="hero-copy">
            <div class="eyebrow">Viewer</div>
            <h2 id="page-title">Knowledge Base</h2>
            <p id="page-subtitle">Select a topic, chapter, or document from the navigation to begin.</p>
          </div>
          <div class="hero-stats" id="hero-stats"></div>
        </section>

        <div class="content-grid">
          <section class="canvas">
            <article id="content-body" class="document-view" aria-live="polite"></article>
            <section id="related-section" class="related-section"></section>
          </section>

          <aside class="context-rail">
            <section class="context-card">
              <div class="context-label" data-i18n="on-this-page">On This Page</div>
              <nav id="toc" class="toc"></nav>
            </section>
            <section class="context-card">
              <div class="context-label" data-i18n="nearby">Nearby</div>
              <div id="sibling-links" class="link-stack"></div>
            </section>
            <section class="context-card" id="export-card">
              <div class="context-label" data-i18n="export">Export</div>
              <div class="export-actions">
                <button id="export-md" class="export-btn" type="button">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M6 15V9l3 3.5L12 9v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 9v6m0 0-2-2m2 2 2-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  <span data-i18n="export-md">Markdown</span>
                </button>
                <button id="export-html" class="export-btn" type="button">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><path d="M7 8 3 12l4 4M17 8l4 4-4 4M14 4l-4 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  <span data-i18n="export-html">HTML</span>
                </button>
                <button id="export-pdf" class="export-btn" type="button">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><path d="M8.75 4.25H16A1.75 1.75 0 0 1 17.75 6v10.25" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.32"/><path d="M6 2.75h8.35L18.75 7.1V19A1.75 1.75 0 0 1 17 20.75H6A1.75 1.75 0 0 1 4.25 19V4.5A1.75 1.75 0 0 1 6 2.75Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M14.25 2.75V7.25h4.5" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M12 10.5v5.1" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M9.85 13.45 12 15.6l2.15-2.15" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><path d="M8.7 18h6.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                  <span data-i18n="export-pdf">PDF</span>
                </button>
              </div>
            </section>
          </aside>
        </div>
      </main>
    </div>

    <script type="module" src="assets/app.js?v=10"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"></script>
  </body>
</html>
