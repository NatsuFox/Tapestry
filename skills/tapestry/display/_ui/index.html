<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tapestry Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="eyebrow">Knowledge Base</div>
          <h1>Tapestry</h1>
          <p>Browse topics, chapters, and evolving research notes in one readable surface.</p>
        </div>

        <button class="sidebar-action" id="home-link" type="button">Open Root Index</button>

        <div class="search-panel">
          <label class="search-label" for="search">Find a topic or document</label>
          <input id="search" class="search" type="search" placeholder="Search titles, paths, excerpts" />
        </div>

        <div id="search-results" class="search-results"></div>
        <nav id="tree" class="tree" aria-label="Knowledge base navigation"></nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <button id="nav-toggle" class="icon-button" type="button" aria-label="Toggle navigation">☰</button>
          <div class="breadcrumbs" id="breadcrumbs"></div>
          <button id="focus-search" class="search-trigger" type="button">Search</button>
        </header>

        <section class="hero">
          <div class="hero-copy">
            <div class="eyebrow">Viewer</div>
            <h2 id="page-title">Knowledge Base</h2>
            <p id="page-subtitle">Select a topic, chapter, or document from the navigation to begin.</p>
          </div>
          <div class="hero-stats" id="hero-stats"></div>
        </section>

        <div class="content-grid">
          <section class="canvas">
            <article id="content-body" class="document-view" aria-live="polite"></article>
            <section id="related-section" class="related-section"></section>
          </section>

          <aside class="context-rail">
            <section class="context-card">
              <div class="context-label">Document Meta</div>
              <div id="doc-meta" class="meta-stack"></div>
            </section>
            <section class="context-card">
              <div class="context-label">On This Page</div>
              <nav id="toc" class="toc"></nav>
            </section>
            <section class="context-card">
              <div class="context-label">Nearby</div>
              <div id="sibling-links" class="link-stack"></div>
            </section>
          </aside>
        </div>
      </main>
    </div>

    <script type="module" src="assets/app.js"></script>
  </body>
</html>
