name: Release Skill Bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version override. Defaults to the pushed tag or pyproject version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release-bundle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release archives
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            python .github/build_release_bundle.py --version "${{ inputs.version }}"
          else
            python .github/build_release_bundle.py
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-skill-bundle
          path: dist/releases/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/releases/*
          generate_release_notes: true
