name: Deploy Portal Pages

on:
  push:
    branches: [main]
    paths:
      - "src/ui/**"
      - ".github/workflows/deploy-portal-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Validate portal SEO surface
        run: python3 tools/check_portal_seo.py

      - name: Upload portal artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/ui

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
