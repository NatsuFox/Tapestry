name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 mypy

    - name: Check code formatting with Black
      run: |
        black --check skills/tapestry/_src/ skills/tapestry/_tests/

    - name: Lint with flake8
      run: |
        flake8 skills/tapestry/_src/ skills/tapestry/_tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 skills/tapestry/_src/ skills/tapestry/_tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Type check with mypy
      run: |
        mypy skills/tapestry/_src/ --ignore-missing-imports
      continue-on-error: true
